services:
  server:
    build:
      dockerfile: dockerfile.dev
    labels:
      service_name: degrees-of-separation
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=devpassword
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
      - DEPLOYMENT_ENV=development
    depends_on:
      neo4j:
        condition: service_healthy
      lgtm:
        condition: service_started
    develop:
      watch:
        - path: ./
          action: rebuild

  neo4j:
    image: neo4j:latest
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/devpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # LGTM — single-image Grafana observability stack (Grafana + Tempo + Loki + Prometheus + OTel Collector).
  # Grafana UI: http://localhost:3000 (no login). OTLP HTTP: http://lgtm:4318 (internal).
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # Alloy — tails Docker container logs and ships them to Loki inside lgtm.
  alloy:
    image: grafana/alloy:latest
    command: run /etc/alloy/config.alloy
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - lgtm

volumes:
  neo4j-data:
  neo4j-logs:
