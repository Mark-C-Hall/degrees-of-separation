apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    editable: false
    jsonData:
      # When viewing a trace in Tempo, "Logs for this span" will query Loki
      # using the trace_id extracted from our JSON log lines.
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{service="server"} | json | trace_id=`${__trace.traceId}`'
      lokiSearch:
        datasourceUid: loki
      nodeGraph:
        enabled: true

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    editable: false
    jsonData:
      # Derived fields parse trace_id out of raw JSON log lines and render a
      # "View in Tempo" link that jumps directly to the matching trace.
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: View in Tempo
